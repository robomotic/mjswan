name: publish-pypi

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (tag or SHA)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run pytest
        run: uv run --extra dev --python 3.12 pytest

      - name: Strip unsupported tags in README
        run: |
          sed -i '/<!-- pypi-strip -->/,/<!-- \/pypi-strip -->/d' README.md

      - name: Setup Node.js for template build
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build web template
        working-directory: src/mjswan/template
        run: |
          npm install
          npm run build

      - name: Remove artifacts from pypi package
        working-directory: src/mjswan/template
        run: |
          rm -rf node_modules
          rm -rf .nodeenv

      - name: Build and publish
        run: |
          uv build
          uv publish
