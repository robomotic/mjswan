name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Ensure workflow runs from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::This workflow can only be run from the main branch. Current ref: ${{ github.ref }}"
            exit 1
          fi

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected semver (e.g. 0.3.0)"
            exit 1
          fi

      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Release v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update version in __init__.py
        run: |
          sed -i "s/^__version__ = \".*\"/__version__ = \"${{ inputs.version }}\"/" src/mjswan/__init__.py

      - name: Update version in package.json
        run: |
          cd src/mjswan/template
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/mjswan/__init__.py src/mjswan/template/package.json
          if git diff --cached --quiet; then
            echo "Version already at ${{ inputs.version }}, skipping commit"
          else
            git commit -m "Bump version to ${{ inputs.version }}"
            git push
          fi

      - name: Create and push tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "Tag v${{ inputs.version }} already exists, skipping"
          else
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

  publish-pypi:
    needs: release
    uses: ./.github/workflows/publish-pypi.yml
    with:
      ref: v${{ inputs.version }}
    permissions:
      id-token: write
      contents: read

  publish-npm:
    needs: release
    uses: ./.github/workflows/publish-npm.yml
    with:
      ref: v${{ inputs.version }}
    secrets: inherit

  create-release:
    needs:
      - publish-pypi
      - publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            gh release create "v${{ inputs.version }}" \
              --title "v${{ inputs.version }}" \
              --generate-notes && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            [ $i -lt 3 ] && sleep 15
          done
          exit 1
