name: publish-npm

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (tag or SHA)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run pytest
        run: uv run --extra dev --python 3.12 pytest # This will sync the version with python package

      - name: Setup Node.js for template build
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build web template
        working-directory: src/mjswan/template
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: src/mjswan/template
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}
        run: npm publish --access public
